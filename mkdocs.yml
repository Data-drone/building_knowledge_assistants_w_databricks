site_name: Databricks Agent Bootcamp
site_description: Build a production-ready internal Knowledge Assistant on Databricks
site_url: https://data-drone.github.io/building_knowledge_assistants_w_databricks/
repo_url: https://github.com/Data-drone/building_knowledge_assistants_w_databricks
repo_name: Data-drone/building_knowledge_assistants_w_databricks
edit_uri: ""

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: databricks
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: databricks-dark
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: DM Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  logo: assets/databricks-logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/databricks.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Bootcamp: bootcamp.md
  - Notebooks: notebooks.md
  - Architecture: architecture.md
  - Setup: setup.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Data-drone/building_knowledge_assistants_w_databricks
